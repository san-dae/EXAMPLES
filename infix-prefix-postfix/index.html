<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Stack Visualizer</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --accent-success: #4ade80;
            --accent-error: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            font-size: 1.4rem; 
            color: var(--text-main); 
            margin: 8px 0 2px 0; 
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin: 0 0 16px 0; 
            text-align: center;
        }

        /* Controls Section */
        .controls {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }

        select, input, button {
            padding: 10px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: #0f172a;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none; /* Mobile reset */
        }

        select:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-group button {
            flex: 1;
            font-weight: 600;
            cursor: pointer;
        }

        #btn-start {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
        }
        #btn-next {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            border: none;
        }
        button:disabled { 
            background: #475569 !important; 
            color: var(--text-muted); 
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Workspace Grid optimized for mobile portrait view */
        .visualizer-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .panel {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel h3 { 
            margin: 0 0 8px 0; 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            width: 100%;
            text-align: left;
        }
        
        /* Token Tracker row */
        .string-track {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            overflow-x: auto;
            width: 100%;
            padding: 4px 0;
            justify-content: center;
        }
        
        .char-box {
            min-width: 28px;
            height: 28px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #334155;
            border-radius: 6px;
            font-weight: bold;
        }
        
        .char-box.active {
            background: var(--accent);
            color: #0f172a;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            transform: scale(1.05);
        }
        
        /* Side-by-side Layout for Stack and Result on tiny screens */
        .row-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .row-group .panel {
            flex: 1;
            min-width: 0; /* Prevents flex items from bursting limits */
        }
        
        /* Compact Stack */
        .stack-wrapper {
            border-left: 3px solid var(--accent);
            border-right: 3px solid var(--accent);
            border-bottom: 3px solid var(--accent);
            width: 80%;
            height: 120px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: flex-start;
            padding: 4px;
            background: #0f172a;
            border-radius: 0 0 8px 8px;
            overflow-y: auto;
        }

        .stack-element {
            background: #312e81;
            color: #e0e7ff;
            border: 1px solid #4338ca;
            padding: 4px;
            margin: 2px 0;
            text-align: center;
            font-weight: 600;
            border-radius: 4px;
            font-size: 0.75rem;
            word-break: break-all;
            animation: slideIn 0.15s ease-out;
        }
        
        /* Beautiful Output Display */
        .result-box {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-success);
            background: #064e3b;
            border: 1px solid #065f46;
            padding: 12px 6px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            word-break: break-all;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Terminal Console Log */
        #log-text {
            width: 100%;
            height: 55px;
            background: #090d16;
            color: #a7f3d0;
            font-family: monospace;
            padding: 6px 8px;
            border-radius: 6px;
            box-sizing: border-box;
            overflow-y: auto;
            font-size: 0.75rem;
            border: 1px solid #1e293b;
            line-height: 1.3;
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Stack Visualizer</h1>
    <div class="subtitle">DSA Expression Conversions</div>

    <div class="controls">
        <select id="conversion-type" onchange="resetVisualizer()">
            <option value="infix-postfix">Infix ➔ Postfix</option>
            <option value="infix-prefix">Infix ➔ Prefix</option>
            <option value="postfix-infix">Postfix ➔ Infix</option>
            <option value="postfix-prefix">Postfix ➔ Prefix</option>
            <option value="prefix-infix">Prefix ➔ Infix</option>
            <option value="prefix-postfix">Prefix ➔ Postfix</option>
        </select>
        <input type="text" id="expression-input" value="(A+B)*C" placeholder="Expression...">
        
        <div class="btn-group">
            <button id="btn-start" onclick="initializeSimulation()">Start</button>
            <button id="btn-next" onclick="stepForward()" disabled>Step ➡️</button>
        </div>
    </div>

    <div class="visualizer-container">
        <!-- Input Tracking & System Terminal Logs -->
        <div class="panel">
            <h3>String & Action Log</h3>
            <div id="string-track-container" class="string-track">Click Start to load...</div>
            <div id="log-text">Ready. Choose mode & click Start.</div>
        </div>

        <!-- Stack and Result Side-by-Side to maximize screen height -->
        <div class="row-group">
            <div class="panel">
                <h3>The Stack</h3>
                <div class="stack-wrapper" id="stack-visual"></div>
            </div>

            <div class="panel">
                <h3>Result Output</h3>
                <div class="result-box" id="result-visual"></div>
            </div>
        </div>
    </div>

    <script>
        let tokens = [];
        let currentStep = 0;
        let stack = [];
        let resultElements = [];
        let isReversedInfix = false;
        let type = "";

        function isAlphaNum(c) { return /[A-Za-z0-9]/.test(c); }

        function precedence(op) {
            if (op === '+' || op === '-') return 1;
            if (op === '*' || op === '/') return 2;
            if (op === '^') return 3;
            return 0;
        }

        function resetVisualizer() {
            document.getElementById("btn-next").disabled = true;
            document.getElementById("string-track-container").innerHTML = "Click Start to load...";
            document.getElementById("stack-visual").innerHTML = "";
            document.getElementById("result-visual").innerText = "";
            document.getElementById("log-text").innerHTML = "Config updated. Tap Start.";
            
            const mode = document.getElementById("conversion-type").value;
            const input = document.getElementById("expression-input");
            if (mode.startsWith("infix")) input.value = "(A+B)*C";
            if (mode.startsWith("postfix")) input.value = "AB+C*";
            if (mode.startsWith("prefix")) input.value = "*+ABC";
        }

        function initializeSimulation() {
            type = document.getElementById("conversion-type").value;
            let rawInput = document.getElementById("expression-input").value.replace(/\s+/g, '');
            
            if(!rawInput) { return; }

            stack = [];
            resultElements = [];
            isReversedInfix = false;
            document.getElementById("result-visual").innerText = "";

            if (type === "infix-prefix") {
                let rev = rawInput.split('').reverse().join('');
                let adjusted = "";
                for(let char of rev) {
                    if(char === '(') adjusted += ')';
                    else if(char === ')') adjusted += '(';
                    else adjusted += char;
                }
                tokens = adjusted.split('');
                isReversedInfix = true;
                log(`Infix➔Prefix: Reversing string to process: ${adjusted}`);
            } else if (type === "prefix-infix" || type === "prefix-postfix") {
                tokens = rawInput.split('');
                currentStep = tokens.length - 1;
                log("Prefix mode: Parsing from Right to Left.");
            } else {
                tokens = rawInput.split('');
                currentStep = 0;
                log("Parsing from Left to Right.");
            }

            renderTrack();
            renderStack();
            document.getElementById("btn-next").disabled = false;
        }

        function renderTrack() {
            const container = document.getElementById("string-track-container");
            container.innerHTML = "";
            tokens.forEach((char, index) => {
                const box = document.createElement("div");
                box.className = "char-box";
                box.innerText = char;
                if (index === currentStep) box.classList.add("active");
                container.appendChild(box);
            });
        }

        function renderStack() {
            const container = document.getElementById("stack-visual");
            container.innerHTML = "";
            stack.forEach(item => {
                const element = document.createElement("div");
                element.className = "stack-element";
                element.innerText = item;
                container.appendChild(element);
            });
        }

        function log(msg) {
            const logBox = document.getElementById("log-text");
            logBox.innerHTML = `> ${msg}<br>` + logBox.innerHTML;
        }

        function stepForward() {
            let ongoing = false;
            if (type === "prefix-infix" || type === "prefix-postfix") {
                if (currentStep >= 0) ongoing = true;
            } else {
                if (currentStep < tokens.length) ongoing = true;
            }

            if (ongoing) {
                let token = tokens[currentStep];
                renderTrack();
                processToken(token);
                renderStack();

                if (type === "prefix-infix" || type === "prefix-postfix") currentStep--;
                else currentStep++;
            } else {
                if (stack.length > 0) {
                    let top = stack.pop();
                    if (type === "infix-postfix" || type === "infix-prefix") {
                        resultElements.push(top);
                        log(`End reached. Popped operator '${top}' to result.`);
                        document.getElementById("result-visual").innerText = isReversedInfix ? [...resultElements].reverse().join('') : resultElements.join('');
                    }
                    renderStack();
                } else {
                    document.getElementById("btn-next").disabled = true;
                    if (isReversedInfix) {
                        let finalAns = [...resultElements].reverse().join('');
                        document.getElementById("result-visual").innerText = finalAns;
                        log(`🏁 Done! Output reversed: ${finalAns}`);
                    } else {
                        log("🏁 Evaluation Complete!");
                    }
                }
            }
        }

        function processToken(token) {
            if (type === "infix-postfix" || type === "infix-prefix") {
                if (isAlphaNum(token)) {
                    resultElements.push(token);
                    log(`Operand '${token}' ➔ Output.`);
                } else if (token === '(') {
                    stack.push(token);
                    log(`Bracket '(' ➔ Stack.`);
                } else if (token === ')') {
                    log(`Bracket ')': Popping operators until '('`);
                    while (stack.length > 0 && stack[stack.length - 1] !== '(') {
                        resultElements.push(stack.pop());
                    }
                    stack.pop();
                } else {
                    while (stack.length > 0 && precedence(stack[stack.length - 1]) >= precedence(token)) {
                        resultElements.push(stack.pop());
                    }
                    stack.push(token);
                    log(`Op '${token}' ➔ Stack.`);
                }
                document.getElementById("result-visual").innerText = isReversedInfix ? [...resultElements].reverse().join('') : resultElements.join('');
            }
            else {
                if (isAlphaNum(token)) {
                    stack.push(token);
                    log(`Operand '${token}' ➔ Stack.`);
                } else {
                    if (stack.length < 2) {
                        log(`⚠️ Syntax Error in expression!`);
                        document.getElementById("btn-next").disabled = true;
                        return;
                    }
                    let v1 = stack.pop();
                    let v2 = stack.pop();
                    let combinedStr = "";

                    switch (type) {
                        case "postfix-infix":
                            combinedStr = `(${v2}${token}${v1})`;
                            break;
                        case "postfix-prefix":
                            combinedStr = `${token}${v2}${v1}`;
                            break;
                        case "prefix-infix":
                            combinedStr = `(${v1}${token}${v2})`;
                            break;
                        case "prefix-postfix":
                            combinedStr = `${v1}${v2}${token}`;
                            break;
                    }
                    stack.push(combinedStr);
                    log(`Merged strings with '${token}'`);
                }
                document.getElementById("result-visual").innerText = stack[stack.length - 1] || "";
            }
        }
    </script>
</body>
</html>
