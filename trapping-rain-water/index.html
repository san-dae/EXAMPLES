<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trapping Rain Water: Master Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #f5c2e7; margin-bottom: 5px; }
        .mode-selector {
            margin: 15px 0;
            background-color: #313244;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            gap: 5px;
        }
        .mode-btn {
            background: none;
            border: none;
            color: #a6adc8;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background-color: #11111b;
            color: #f9e2af;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .panel {
            background-color: #313244;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid-container { margin: 20px 0; }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 50px);
            grid-template-rows: repeat(5, 50px);
            gap: 4px;
            background-color: #45475a;
            padding: 10px;
            border-radius: 8px;
        }
        .cell {
            width: 50px;
            height: 50px;
            background-color: #181825;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #585b70;
        }
        .cell.building { background-color: #b4befe; color: #11111b; font-weight: bold; }
        .cell.water { background-color: #74c7ec; animation: fillUp 0.3s ease forwards; }
        .cell.current-col { border: 3px solid #f9e2af; box-sizing: border-box; }
        .cell.left-wall-mark { border: 3px dashed #a6e3a1; box-sizing: border-box; }
        .cell.right-wall-mark { border: 3px dashed #f38ba8; box-sizing: border-box; }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }
        button.action-btn {
            background-color: #11111b;
            color: #cdd6f4;
            border: 1px solid #cdd6f4;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        button.action-btn:hover { background-color: #f9e2af; color: #11111b; }
        
        .math-box {
            background-color: #181825;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            border-left: 5px solid #89b4fa;
        }
        .formula {
            font-size: 18px;
            font-weight: bold;
            color: #89b4fa;
            margin-bottom: 15px;
            text-align: center;
            background: #313244;
            padding: 10px;
            border-radius: 4px;
        }
        .trace-text { line-height: 1.6; }
        @keyframes fillUp {
            0% { transform: scale(0.7); background-color: #89b4fa; }
            100% { transform: scale(1); background-color: #74c7ec; }
        }
    </style>
</head>
<body>

    <h1>Water Trapping Interactive Playground</h1>
    <p style="color: #a6adc8; margin: 5px 0 15px 0;">Array: [4, 1, 0, 2, 1, 3]</p>

    <div class="mode-selector">
        <button id="btn-dabba" class="mode-btn active" onclick="switchMode('dabba')">Dabba Approach (Vertical Columns)</button>
        <button id="btn-stack" class="mode-btn" onclick="switchMode('stack')">Stack Approach (Horizontal Layers)</button>
    </div>
    
    <div class="controls">
        <button class="action-btn" onclick="resetSimulation()">🔄 Restart</button>
        <button class="action-btn" onclick="stepSimulation()" style="border-color: #a6e3a1; color: #a6e3a1;">➡️ Next Step</button>
    </div>

    <div class="panel">
        <div class="grid-container">
            <div id="visual-grid" class="grid"></div>
        </div>
        
        <div class="math-box">
            <div id="formula-bar" class="formula">Formula</div>
            <div id="trace-panel" class="trace-text">Click Next Step to begin tracking!</div>
        </div>
    </div>

    <script>
        const h = [4, 1, 0, 2, 1, 3];
        const lm = [4, 4, 4, 4, 4, 4];
        const rm = [4, 3, 3, 3, 3, 3];
        const n = h.length;
        const maxH = 4;

        let activeMode = 'dabba'; // 'dabba' or 'stack'
        let dabbaI = -1;
        let dabbaTotal = 0;

        let stackI = 0;
        let stackSt = [];
        let stackTotal = 0;

        function createGrid() {
            const grid = document.getElementById('visual-grid');
            grid.innerHTML = '';
            for (let row = maxH; row >= 0; row--) {
                for (let col = 0; col < n; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${row}-${col}`;
                    if (row < h[col]) {
                        cell.classList.add('building');
                        cell.innerText = h[col];
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function switchMode(mode) {
            activeMode = mode;
            document.getElementById('btn-dabba').classList.toggle('active', mode === 'dabba');
            document.getElementById('btn-stack').classList.toggle('active', mode === 'stack');
            resetSimulation();
        }

        function resetSimulation() {
            dabbaI = -1; dabbaTotal = 0;
            stackI = 0; stackSt = []; stackTotal = 0;
            createGrid();
            
            if (activeMode === 'dabba') {
                document.getElementById('formula-bar').innerHTML = `Water = min(<span style="color:#a6e3a1">LeftMax</span>, <span style="color:#f38ba8">RightMax</span>) - <span style="color:#b4befe">Height</span>`;
                document.getElementById('trace-panel').innerText = 'Dabba Mode Active: Column-by-Column calculation. Click "Next Step".';
            } else {
                document.getElementById('formula-bar').innerHTML = `Layer Water = (min(<span style="color:#a6e3a1">LeftWall</span>, <span style="color:#f38ba8">RightWall</span>) - <span style="color:#f9e2af">Floor</span>) × <span style="color:#89b4fa">Width</span>`;
                document.getElementById('trace-panel').innerText = 'Stack Mode Active: Horizontal layer discovery. Click "Next Step".';
            }
        }

        function stepDabba() {
            dabbaI++;
            if (dabbaI >= n) {
                document.getElementById('trace-panel').innerHTML = `<strong>Dabba Run Complete! Total Trapped = ${dabbaTotal}</strong>`;
                return;
            }
            clearGridHighlights();

            // Outline current working column
            for (let r = 0; r <= maxH; r++) document.getElementById(`cell-${r}-${dabbaI}`).classList.add('current-col');

            let leftMaxVal = lm[dabbaI];
            let rightMaxVal = rm[dabbaI];
            let ceiling = Math.min(leftMaxVal, rightMaxVal);
            let waterHere = ceiling - h[dabbaI];
            if (waterHere < 0) waterHere = 0;
            dabbaTotal += waterHere;

            if (waterHere > 0) {
                for (let r = h[dabbaI]; r < ceiling; r++) document.getElementById(`cell-${r}-${dabbaI}`).classList.add('water');
            }

            document.getElementById('trace-panel').innerHTML = `
                <strong>At Column index <span style="color:#f9e2af">${dabbaI}</span> (Height = ${h[dabbaI]}):</strong><br>
                • Precalculated LeftMax boundary array value = <span style="color:#a6e3a1">${leftMaxVal}</span><br>
                • Precalculated RightMax boundary array value = <span style="color:#f38ba8">${rightMaxVal}</span><br>
                • Water can fill up to min(${leftMaxVal}, ${rightMaxVal}) = <strong>${ceiling}</strong><br>
                • Added to column: ${ceiling} (Ceiling) - ${h[dabbaI]} (My Base) = <span style="color:#74c7ec; font-weight:bold;">+${waterHere} unit(s)</span><br><br>
                <span style="color:#a6e3a1; font-weight:bold;">Total Running Sum = ${dabbaTotal}</span>
            `;
        }

        function stepStack() {
            if (stackI >= n) {
                document.getElementById('trace-panel').innerHTML = `<strong>Stack Run Complete! Total Trapped = ${stackTotal}</strong>`;
                return;
            }
            clearGridHighlights();
            
            let i = stackI;
            // Highlight right wall candidate
            for (let r = 0; r <= maxH; r++) document.getElementById(`cell-${r}-${i}`).classList.add('right-wall-mark');

            if (stackSt.length > 0 && h[stackSt[stackSt.length - 1]] < h[i]) {
                // We hit a floor bottleneck loop step!
                let valleyIdx = stackSt.pop();
                
                if (stackSt.length === 0) {
                    document.getElementById('trace-panel').innerHTML = `
                        <strong>Index ${i} (Height ${h[i]}):</strong> Found bottom floor index ${valleyIdx}, but stack is now empty.<br>
                        <span style="color:#f38ba8">• No left wall container exists! Water leaks away to the left.</span><br>
                        Pushing current index ${i} to stack.
                    `;
                    stackSt.push(i);
                    stackI++;
                    return;
                }

                let leftIdx = stackSt[stackSt.length - 1];
                
                // Color marks
                for (let r = 0; r <= maxH; r++) {
                    document.getElementById(`cell-${r}-${leftIdx}`).classList.add('left-wall-mark');
                    document.getElementById(`cell-${r}-${valleyIdx}`).classList.add('current-col');
                }

                let layerHeight = Math.min(h[leftIdx], h[i]) - h[valleyIdx];
                let layerWidth = i - leftIdx - 1;
                let layerWater = layerHeight * layerWidth;
                stackTotal += layerWater;

                if (layerWater > 0) {
                    for (let c = leftIdx + 1; c < i; c++) {
                        for (let r = h[valleyIdx]; r < Math.min(h[leftIdx], h[i]); r++) {
                            document.getElementById(`cell-${r}-${c}`).classList.add('water');
                        }
                    }
                }

                document.getElementById('trace-panel').innerHTML = `
                    <strong>Inside Stack Bottleneck Loop:</strong><br>
                    • Right Wall index = ${i} (Height: ${h[i]})<br>
                    • Floor/Valley popped = index ${valleyIdx} (Height: ${h[valleyIdx]})<br>
                    • Left Wall boundary = index ${leftIdx} (Height: ${h[leftIdx]})<br>
                    • Layer Calculation: (min(${h[leftIdx]}, ${h[i]}) - ${h[valleyIdx]}) × Width (${layerWidth}) = <span style="color:#74c7ec; font-weight:bold;">+${layerWater} blocks</span><br><br>
                    Stack state remains: [${stackSt.join(', ')}] (Will recheck if Right Wall can trap more layers!)
                `;
                // Note: We don't increment stackI here because the while loop needs to recheck the exact same right wall!
            } else {
                // Standard descending stride step
                stackSt.push(i);
                document.getElementById('trace-panel').innerHTML = `
                    <strong>Index ${i} (Height ${h[i]}):</strong> Building is shorter or equal to stack top.<br>
                    • Walking down into a slope. No pool structure capped.<br>
                    • Pushing index to stack.<br><br>
                    Stack index trajectory: [${stackSt.join(', ')}]
                `;
                stackI++;
            }
        }

        function clearGridHighlights() {
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('current-col', 'left-wall-mark', 'right-wall-mark');
            });
        }

        function stepSimulation() {
            if (activeMode === 'dabba') stepDabba();
            else stepStack();
        }

        resetSimulation();
    </script>
</body>
</html>
