<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D DP Matrix Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h2 {
            color: #00bcd4;
            text-align: center;
            margin-bottom: 5px;
        }
        .meta-display {
            display: flex;
            justify-content: center;
            gap: 30px;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
            font-size: 18px;
        }
        .meta-item span {
            color: #00bcd4;
            font-weight: bold;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        button {
            background-color: #1e1e1e;
            color: #fff;
            border: 2px solid #333;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            border-color: #00bcd4;
            background-color: #00bcd4;
            color: #121212;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status-panel {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 5px;
            border-left: 5px solid #ff9800;
            margin-bottom: 25px;
            font-size: 16px;
            min-height: 40px;
            line-height: 1.4;
        }
        .matrix-container {
            overflow-x: auto;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        table {
            border-collapse: collapse;
            margin: 0 auto;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #333;
            min-width: 60px;
        }
        th {
            background-color: #252525;
            color: #00bcd4;
            font-weight: 600;
        }
        .row-label {
            background-color: #252525;
            color: #ff9800;
            font-weight: bold;
            text-align: left;
        }
        .cell-value {
            font-size: 18px;
            font-weight: bold;
        }
        td.active-cell {
            border: 2px solid #00bcd4 !important;
            background-color: rgba(0, 188, 212, 0.15);
        }
        td.source-exclude {
            border: 2px solid #e91e63 !important;
            background-color: rgba(233, 30, 99, 0.15);
        }
        td.source-include {
            border: 2px solid #4caf50 !important;
            background-color: rgba(76, 175, 80, 0.15);
        }
        td.updated {
            animation: pulse 0.4s ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: #333; }
            100% { transform: scale(1); }
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 14px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 16px; height: 16px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h2>2D DP Matrix Visualizer</h2>
    
    <div class="meta-display">
        <div class="meta-item">input array: <span id="arrContainer"></span></div>
        <div class="meta-item">target sum: <span id="targetContainer"></span></div>
    </div>
    
    <div class="controls">
        <button id="prevBtn" disabled>◀ previous</button>
        <button id="nextBtn">next ▶</button>
        <button id="resetBtn">reset</button>
    </div>

    <div class="status-panel" id="statusText"></div>

    <div class="matrix-container">
        <table id="dpMatrix"></table>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box" style="background: rgba(0, 188, 212, 0.2); border: 2px solid #00bcd4;"></div> current cell: dp[i][j]</div>
        <div class="legend-item"><div class="box" style="background: rgba(233, 30, 99, 0.2); border: 2px solid #e91e63;"></div> exclude path: dp[i-1][j]</div>
        <div class="legend-item"><div class="box" style="background: rgba(76, 175, 80, 0.2); border: 2px solid #4caf50;"></div> include path: dp[i-1][j-nums[i]]</div>
    </div>
</div>

<script>
    const nums = [5, 2, 3, 10, 6, 8];
    const sum = 10;
    
    document.getElementById("arrContainer").innerText = `[${nums.join(', ')}]`;
    document.getElementById("targetContainer").innerText = sum;
    
    let states = [];
    let currentStepIndex = 0;

    function generate2DStates() {
        const rows = nums.length;
        const cols = sum + 1;
        let currentMatrix = Array.from({ length: rows }, () => Array(cols).fill("-"));

        states.push({
            matrix: JSON.parse(JSON.stringify(currentMatrix)),
            msg: `initialized 2D matrix of size ${rows}x${cols}.`,
            active: null, exclude: null, include: null
        });

        currentMatrix[0][0] = 1;
        states.push({
            matrix: JSON.parse(JSON.stringify(currentMatrix)),
            msg: `base case row 0: dp[0][0] = 1.`,
            active: {r: 0, c: 0}, exclude: null, include: null
        });

        if (nums[0] <= sum) {
            currentMatrix[0][nums[0]] = 1;
            states.push({
                matrix: JSON.parse(JSON.stringify(currentMatrix)),
                msg: `base case row 0: setting dp[0][${nums[0]}] = 1 since element fits within target bounds.`,
                active: {r: 0, c: nums[0]}, exclude: null, include: null
            });
        }

        for(let j=0; j<cols; j++) {
            if(currentMatrix[0][j] === "-") currentMatrix[0][j] = 0;
        }

        for (let i = 1; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                let excludeVal = currentMatrix[i - 1][j];
                let includeVal = 0;
                let srcInclude = null;

                if (j >= nums[i]) {
                    includeVal = currentMatrix[i - 1][j - nums[i]];
                    srcInclude = { r: i - 1, c: j - nums[i] };
                }

                states.push({
                    matrix: JSON.parse(JSON.stringify(currentMatrix)),
                    msg: `evaluating cell dp[${i}][${j}] using element nums[${i}] (${nums[i]}) for sum ${j}.`,
                    active: { r: i, c: j },
                    exclude: { r: i - 1, c: j },
                    include: srcInclude
                });

                currentMatrix[i][j] = excludeVal + includeVal;

                states.push({
                    matrix: JSON.parse(JSON.stringify(currentMatrix)),
                    msg: `calculated dp[${i}][${j}] = exclude (${excludeVal}) + include (${includeVal}) = ${currentMatrix[i][j]}`,
                    active: { r: i, c: j },
                    exclude: { r: i - 1, c: j },
                    include: srcInclude,
                    updated: { r: i, c: j }
                });
            }
        }

        states.push({
            matrix: JSON.parse(JSON.stringify(currentMatrix)),
            msg: `🎉 matching complete! final output value is ${currentMatrix[rows-1][sum]}. subsets tracking to 10 are {5, 2, 3}, {2, 8}, and {10}.`,
            active: { r: rows - 1, c: sum }, exclude: null, include: null
        });
    }

    function renderMatrixStep(stepIdx) {
        const state = states[stepIdx];
        const table = document.getElementById("dpMatrix");
        const statusText = document.getElementById("statusText");
        
        statusText.innerText = state.msg;
        table.innerHTML = "";

        let headerRow = "<tr><th>subsets</th>";
        for (let j = 0; j <= sum; j++) {
            headerRow += `<th>sum ${j}</th>`;
        }
        headerRow += "</tr>";
        table.innerHTML += headerRow;

        state.matrix.forEach((row, i) => {
            let rowHtml = `<tr><td class="row-label">i=${i} (num: ${nums[i]})</td>`;
            row.forEach((val, j) => {
                let classes = [];
                
                if (state.active && state.active.r === i && state.active.c === j) classes.push("active-cell");
                if (state.exclude && state.exclude.r === i && state.exclude.c === j) classes.push("source-exclude");
                if (state.include && state.include.r === i && state.include.c === j) classes.push("source-include");
                if (state.updated && state.updated.r === i && state.updated.c === j) classes.push("updated");

                rowHtml += `<td class="${classes.join(' ')}"><span class="cell-value">${val}</span></td>`;
            });
            rowHtml += "</tr>";
            table.innerHTML += rowHtml;
        });

        document.getElementById("prevBtn").disabled = stepIdx === 0;
        document.getElementById("nextBtn").disabled = stepIdx === states.length - 1;
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
        if (currentStepIndex < states.length - 1) {
            currentStepIndex++;
            renderMatrixStep(currentStepIndex);
        }
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentStepIndex > 0) {
            currentStepIndex--;
            renderMatrixStep(currentStepIndex);
        }
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
        currentStepIndex = 0;
        renderMatrixStep(currentStepIndex);
    });

    generate2DStates();
    renderMatrixStep(0);
</script>

</body>
</html>
